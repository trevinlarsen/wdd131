<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Form</title>
    <link rel="stylesheet" href="card.css">
    <script src="card.js" defer></script>
</head>
<body>
    <form class="credit-card-form">
        <!-- Card Front -->
        <div class="card card-front">
            <label for="card-number">Card Number</label>
            <input type="text" id="card-number" placeholder="1234 5678 9123 4567" required maxlength="19">
            
            <label for="card-name">Cardholder Name</label>
            <input type="text" id="card-name" placeholder="John Doe" required>

            <img class="card-image" src="data:image/svg+xml;base64,..." height="55px" alt="Card Logo">
        </div>
        
        <!-- Card Back -->
        <div class="card card-back">
            <label for="card-cvc">CVC</label>
            <input type="text" id="card-cvc" placeholder="123" required maxlength="3">
        </div>

        <!-- Submit Button -->
        <button type="submit">Submit</button>
    </form>
</body>
</html>
